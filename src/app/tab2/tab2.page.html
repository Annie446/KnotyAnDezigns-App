<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Product List
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-grid>
    <ion-row>
      @for( prod of products; track prod){
      <ion-col size="12" size-md="6" size-lg="4">

          <ion-card class="card">
          <ion-img [src] ="prod.img"></ion-img>

          <ion-card-header>
            <ion-card-title>{{ prod.description }}</ion-card-title>
            <ion-card-subtitle>{{ prod.price }}</ion-card-subtitle>
          </ion-card-header>


          <ion-card-content>
            <div class="button-row">

              <ion-button fill="clear" color="danger">
                <ion-icon name="heart"> </ion-icon> Like
              </ion-button>

              <ion-button fill="clear" color="primary">
                <ion-icon name="cart"></ion-icon> Add to Cart
              </ion-button>

              <ion-button fill="clear" color="medium" (click)="goToReview()">
                <ion-icon name="help-circle"  ></ion-icon> Review
              </ion-button>

            </div>
          </ion-card-content>
        </ion-card> 
        </ion-col>
      }
      
    </ion-row>
  </ion-grid>
</ion-content>
